form:
  name: TXTCOMBO
  title: Text + Combo
openapi_defaults:
  base_url: https://example.com/api
fields:
  - code: MEMO
    label: "Memo"
    control_type: text
    length: 60
  - code: STAT
    label: "Status"
    control_type: combobox
    values:
      - {value: A, description: Active}
      - {value: I, description: Inactive}
  - code: DCMB
    label: "Distro"
    control_type: combobox
    binding:
      openapi_spec: ./oracle.json
      endpoint: /codes
      values_path: $.items[*]
      value_field: code
      description_field: name
